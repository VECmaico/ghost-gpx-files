<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #ghost-gpx-map { height: 300px; width: 100%; }
    </style>
</head>
<body>
<div id="ghost-gpx-map"></div>
<script>
    async function initMap() {
        const map = L.map('ghost-gpx-map').setView([50.5, 4.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const trackGroup = L.featureGroup().addTo(map);
        const rootUrl = 'https://raw.githubusercontent.com/VECmaico/ghost-gpx-files/refs/heads/main/GPX/';
        const manifests = ['2025manifest.json', '2026manifest.json'];

        for (const m of manifests) {
            const res = await fetch(rootUrl + m);
            const files = await res.json();
            
            for (const file of files) {
                // SKIP POIs entirely to isolate the line rendering issue
                if (file.toLowerCase().includes('/poi/')) continue;

                const r = await fetch(rootUrl + file);
                const str = await r.text();
                const dom = new DOMParser().parseFromString(str, "text/xml");
                const geo = toGeoJSON.gpx(dom);

                // FORCE: Only ever take the very first geometry found in the file
                if (geo.features && geo.features.length > 0) {
                    L.geoJSON(geo.features[0], {
                        style: { color: m.includes('2026') ? '#27ae60' : '#2980b9', weight: 4 }
                    }).addTo(trackGroup);
                }
            }
        }
        if (trackGroup.getLayers().length > 0) map.fitBounds(trackGroup.getBounds());
    }
    window.onload = initMap;
</script>
</body>
</html>
